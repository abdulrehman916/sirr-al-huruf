    <script>
      // Unregister any existing service workers to clear stale cache
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          for (let registration of registrations) {
            registration.unregister();
          }
        }).catch(() => {});
      }

      if ('serviceWorker' in navigator && !import.meta.env.DEV) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            // When a new SW is waiting, activate it immediately
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              if (!newWorker) return;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  newWorker.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });

            // Cache-warming: after app loads, send all loaded resource URLs to SW
            // This ensures every JS chunk (containing all data/calc modules) is
            // stored offline immediately — no second visit required.
            function warmCache() {
              if (!navigator.serviceWorker.controller) return;
              const urls = performance.getEntriesByType('resource')
                .map(e => e.name)
                .filter(u => u.startsWith(location.origin) || u.includes('fonts.g'));
              if (urls.length) {
                navigator.serviceWorker.controller.postMessage({ type: 'CACHE_URLS', urls });
              }
            }

            // Run after React has mounted and lazy chunks are loaded
            setTimeout(warmCache, 3000);
            // Run again after a longer delay to catch lazily loaded page chunks
            setTimeout(warmCache, 10000);
          }).catch(() => {});

          // NOTE: Do NOT reload on controllerchange — self.skipWaiting() in sw.js
          // install fires immediately and causes controllerchange on every load,
          // which triggers an infinite reload loop on iOS Safari.
          // Vite asset filenames are content-hashed so stale assets are not possible.
        });
      }
    </script>
