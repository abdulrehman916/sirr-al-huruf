    <meta name="description" content="Abjad Numerology Calculator — Calculate the numerical value of Arabic text using the Abjad (Ebced Kebir) system." />

    <link rel="apple-touch-icon" href="https://media.base44.com/images/public/69f3dea51ce92ee2fde20be6/9627dbf20_generated_image.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#020710" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-title" content="سرّ الحروف" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            // When a new SW is waiting, activate it immediately
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              if (!newWorker) return;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  newWorker.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });
          }).catch(() => {});

          // Reload once when a new SW takes control (avoids stale assets)
          let refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (!refreshing) { refreshing = true; window.location.reload(); }
          });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
